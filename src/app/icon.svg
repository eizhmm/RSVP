  <circle cx="32" cy="23.5" r="3.25" stroke="#d4b76a" stroke-width="0.75" fill="none" opacity="0.8"/>
  <!-- Leaf accent (kind / garden) -->
  <path d="M42.5 20.5c2.8 1.2 4.2 3.6 3.2 5.2-1.6-.4-3.4-1.8-3.8-4-.2-1 .2-1.2.6-1.2z" fill="#6b8f7a"/>
  <path d="M21.5 20.5c-2.8 1.2-4.2 3.6-3.2 5.2 1.6-.4 3.4-1.8 3.8-4 .2-1-.2-1.2-.6-1.2z" fill="#6b8f7a"/>
