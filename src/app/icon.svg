  <circle cx="32" cy="32" r="24" stroke="#d4b76a" stroke-width="0.75" opacity="0.55"/>
  <!-- Table top -->
  <rect x="16" y="28" width="32" height="3.5" rx="1" fill="#f4f7f4"/>
  <!-- Table apron -->
  <rect x="18.5" y="31.5" width="27" height="1.5" fill="#6b8f7a"/>
  <!-- Pedestal -->
  <rect x="29.5" y="33" width="5" height="10" rx="0.5" fill="#e8efe9"/>
  <!-- Base -->
  <rect x="23" y="42.5" width="18" height="2.5" rx="1" fill="#f4f7f4"/>
